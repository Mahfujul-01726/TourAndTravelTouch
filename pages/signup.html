<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Tour And Travel Touch</title>
    <link rel="stylesheet" href="../assets/css/theme-orange.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4)), url('../assets/images/ui/background img.png') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .signup-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 44px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .signup-brand {
            text-align: center;
            margin-bottom: 32px;
            text-decoration: none;
            display: block;
        }
        .signup-brand .brand-icon {
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffa500, #ff7b00);
            border-radius: 14px;
            color: white;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(255,165,0,0.3);
            margin-bottom: 12px;
        }
        .signup-brand h1 { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 24px; color: #1a1a2e; }
        .signup-brand h1 span { color: #ffa500; }
        .signup-card .form-control {
            padding: 14px 16px;
            margin-bottom: 14px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            background: #fafafa;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .signup-card .form-control:focus {
            border-color: #ffa500;
            background: white;
            box-shadow: 0 0 0 3px rgba(255,165,0,0.1);
        }
        .signup-card .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffa500, #ff7b00);
            border: none;
            font-weight: 600;
            font-size: 16px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .signup-card .btn-primary:hover {
            background: linear-gradient(135deg, #ff7b00, #e66900);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255,165,0,0.3);
        }
        .signup-divider { position: relative; text-align: center; margin: 24px 0; }
        .signup-divider hr { border: none; border-top: 1px solid #e0e0e0; }
        .signup-divider span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 0 16px;
            color: #999;
            font-size: 13px;
        }
        .login-link { text-align: center; margin-top: 16px; font-size: 14px; color: #666; }
        .login-link a { color: #ffa500; text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: #888; text-decoration: none; font-size: 13px; }
        .back-link a:hover { color: #ffa500; }
        .flash-toast.fixed-flash {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            max-width: 90vw;
        }
        .flash-toast.fixed-flash.show { display: block; }
        .flash-toast.flash-success { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
        .flash-toast.flash-error { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    </style>
</head>
<body>
    <div id="flashToast" class="flash-toast fixed-flash" role="alert"></div>

    <div class="signup-card">
        <a href="../index.html" class="signup-brand">
            <div class="brand-icon"><i class="fa-solid fa-compass"></i></div>
            <h1><span>Sign</span> Up Now</h1>
        </a>
        <form action="../backend/handlers/register.php" method="post">
            <input type="text" name="fullname" class="form-control" placeholder="Full Name" required>
            <input type="email" name="email" class="form-control" placeholder="Your Email" required>
            <input type="password" name="password" class="form-control" placeholder="Password (min. 8 characters)" required minlength="8">
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <div class="signup-divider">
            <hr><span>OR</span>
        </div>
        <div class="login-link">
            <p>Already have an account? <a href="#">Log In Now</a></p>
        </div>
        <div class="back-link">
            <a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        // CSRF Token Injection
        fetch('../backend/handlers/csrf-token.php')
            .then(r => r.json())
            .then(data => {
                document.querySelectorAll('form').forEach(form => {
                    if (!form.querySelector('input[name="csrf_token"]')) {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = 'csrf_token';
                        input.value = data.token;
                        form.appendChild(input);
                    }
                });
            })
            .catch(() => {});

        // Flash Message Display
        function showFlash(type, message) {
            const toast = document.getElementById('flashToast');
            toast.className = 'flash-toast fixed-flash flash-' + type + ' show';
            toast.textContent = message;
            setTimeout(() => { toast.classList.remove('show'); }, 5000);
        }

        fetch('../backend/handlers/flash.php')
            .then(r => r.json())
            .then(data => {
                if (data.type && data.message) {
                    showFlash(data.type, data.message);
                }
            })
            .catch(() => {});
    </script>
</body>
</html>
