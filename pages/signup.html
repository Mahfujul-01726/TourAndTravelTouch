<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Tour And Travel Touch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/assets/images/ui/background img.png') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .signup-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        .signup-card h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            color: #333;
        }
        .signup-card h1 span { color: #ffa500; }
        .signup-card .form-control {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .signup-card .btn-primary {
            width: 100%;
            padding: 12px;
            background: #ffa500;
            border: none;
            font-weight: 600;
            border-radius: 8px;
        }
        .signup-card .btn-primary:hover { background: #e69500; }
        .signup-card hr { margin: 20px 0; }
        .signup-card .or {
            text-align: center;
            margin: -30px 0 20px;
            background: white;
            display: inline-block;
            padding: 0 15px;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }
        .signup-card .login-link {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <h1><span>Sign</span> Up Now</h1>
        <form action="/backend/handlers/booking.php" method="post">
            <input type="text" name="fullname" class="form-control" placeholder="Full Name" required>
            <input type="email" name="email" class="form-control" placeholder="Your Email" required>
            <input type="password" name="password" class="form-control" placeholder="Your Password" required>
            <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>
        <hr>
        <p class="or">OR</p>
        <div class="login-link">
            <p>Already have an account? <a href="#">Log In Now</a></p>
        </div>
    </div>
</body>
</html>
