name: 🚀 Professional Auto-Deployment (InfinityFree)

# This workflow runs automatically every time you push code to the 'main' branch.
# It uses an intelligent FTP syncing action to only upload modified/new files.
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  web-deploy:
    name: 🌐 Sync Files to Web Host
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Get latest codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so the FTP deploy action can detect changed files

      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          # Your InfinityFree FTP host (usually ftpupload.net)
          server: ftpupload.net
          
          # These credentials must be configured in your GitHub Repository Settings:
          # Go to Settings -> Secrets and variables -> Actions -> Secrets
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          
          # The local directory to upload (current directory)
          local-dir: ./
          
          # The remote folder where InfinityFree hosts files (must be /htdocs/)
          server-dir: /htdocs/
          
          # List of files/folders to completely exclude from upload to keep your server clean
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.vscode/**
            **/node_modules/**
            **/README.md
            **/opencode.json
            **/*.psd
            **/Thumbs.db
            **/.DS_Store
