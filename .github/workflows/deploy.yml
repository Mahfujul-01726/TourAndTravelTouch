name: Deploy to FTP Webhost

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate FTP secrets
        shell: bash
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_USERNAME" ]; then
            echo "Missing repository secret: FTP_USERNAME"
            exit 1
          fi

          if [ -z "$FTP_PASSWORD" ]; then
            echo "Missing repository secret: FTP_PASSWORD"
            exit 1
          fi
      
      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /htdocs/
          security: explicit
          exclude: |
            .git*
            .github
            .vscode
            node_modules
            README.md
            opencode.json
            *.psd
