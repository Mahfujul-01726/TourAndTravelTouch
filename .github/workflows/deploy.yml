name: Deploy to FTP Webhost

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Debug FTP connection
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Testing connection to ftpupload.net on port 21..."
          timeout 15 bash -c 'echo > /dev/tcp/ftpupload.net/21 && echo "Port 21 OPEN" || echo "Port 21 CLOSED"'
          echo ""
          echo "Trying DNS resolution..."
          nslookup ftpupload.net 2>&1 || true
          echo ""
          echo "Attempting FTP login (verbose)..."
          lftp -c "
            debug 3
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" ftpupload.net
            pwd
            quit
          " 2>&1 || echo "FAILED"

      - name: Deploy via LFTP
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            debug 3
            set ftp:ssl-allow false
            mirror -R ./ /htdocs/ \
              --exclude-glob .git* \
              --exclude-glob .github \
              --exclude-glob .vscode \
              --exclude-glob node_modules \
              --exclude-glob README.md \
              --exclude-glob opencode.json \
              --exclude-glob '*.psd'
            quit
          " -u "$FTP_USERNAME","$FTP_PASSWORD" ftpupload.net
